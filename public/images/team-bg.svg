<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <!-- Dark base gradient -->
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f0a1e"/>
      <stop offset="50%"  stop-color="#1a0f3c"/>
      <stop offset="100%" stop-color="#0d0820"/>
    </linearGradient>

    <!-- Glow radials -->
    <radialGradient id="glow1" cx="20%" cy="30%" r="45%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="40%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="55%" cy="15%" r="30%">
      <stop offset="0%"   stop-color="#6d28d9" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>

    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.07"/>
    </pattern>

    <!-- Fine diagonal lines -->
    <pattern id="lines" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="60" stroke="#a855f7" stroke-width="0.4" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Base dark background -->
  <rect width="1440" height="900" fill="url(#base)"/>

  <!-- Diagonal lines layer -->
  <rect width="1440" height="900" fill="url(#lines)"/>

  <!-- Dot grid layer -->
  <rect width="1440" height="900" fill="url(#dots)"/>

  <!-- Glow layers -->
  <rect width="1440" height="900" fill="url(#glow1)"/>
  <rect width="1440" height="900" fill="url(#glow2)"/>
  <rect width="1440" height="900" fill="url(#glow3)"/>

  <!-- Decorative arcs (top-left) -->
  <circle cx="0" cy="0" r="320" fill="none" stroke="#7c3aed" stroke-width="0.6" opacity="0.15"/>
  <circle cx="0" cy="0" r="500" fill="none" stroke="#7c3aed" stroke-width="0.4" opacity="0.10"/>

  <!-- Decorative arcs (bottom-right) -->
  <circle cx="1440" cy="900" r="380" fill="none" stroke="#a855f7" stroke-width="0.6" opacity="0.15"/>
  <circle cx="1440" cy="900" r="560" fill="none" stroke="#a855f7" stroke-width="0.4" opacity="0.10"/>

  <!-- Subtle center horizon line -->
  <line x1="0" y1="450" x2="1440" y2="450" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>

  <!-- Floating geometric diamond (top-right) -->
  <polygon points="1280,60 1320,120 1280,180 1240,120" fill="none" stroke="#a855f7" stroke-width="0.8" opacity="0.18"/>
  <polygon points="1300,80 1330,120 1300,160 1270,120" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.12"/>

  <!-- Floating geometric diamond (bottom-left) -->
  <polygon points="140,720 180,770 140,820 100,770" fill="none" stroke="#a855f7" stroke-width="0.8" opacity="0.15"/>

  <!-- Small accent dots scattered -->
  <circle cx="200"  cy="150"  r="2" fill="#a855f7" opacity="0.4"/>
  <circle cx="420"  cy="80"   r="1.5" fill="#c084fc" opacity="0.35"/>
  <circle cx="1100" cy="200"  r="2" fill="#7c3aed" opacity="0.4"/>
  <circle cx="900"  cy="750"  r="2" fill="#a855f7" opacity="0.35"/>
  <circle cx="350"  cy="800"  r="1.5" fill="#c084fc" opacity="0.3"/>
  <circle cx="720"  cy="50"   r="1.5" fill="#a855f7" opacity="0.3"/>
  <circle cx="1350" cy="600"  r="2" fill="#7c3aed" opacity="0.35"/>

  <!-- Bottom fade to blend with content below -->
  <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0f0a1e" stop-opacity="0.6"/>
  </linearGradient>
  <rect width="1440" height="900" fill="url(#bottomFade)"/>
</svg>
